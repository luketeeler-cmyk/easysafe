<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasySafe</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg:#121110;--surface:#1a1917;--surface2:#21201d;
    --border:#2e2c28;--hover:#1e1d1a;
    --text:#c4c0b8;--text-dim:#7a7670;--text-faint:#5a5650;--text-bright:#e8e5de;
    --accent:#7a9e7e;--accent-dark:#5c7e60;
    --accent-bg:rgba(122,158,126,.12);--accent-border:rgba(122,158,126,.30);
    --danger:#b54a3a;
    --cond-new:#6db87a;--cond-excellent:#5a9e64;--cond-good:#c4a83a;
    --cond-fair:#c48a3a;--cond-poor:#b54a3a;
    --radius:8px;--radius-lg:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Barlow',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  a{color:var(--accent)}

  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}
  @keyframes fadeScale{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .fade-up{animation:fadeUp .3s ease both}

  #toast{position:fixed;top:20px;right:20px;z-index:9999;background:var(--surface2);color:var(--accent);padding:12px 20px;border-radius:var(--radius);font-size:14px;font-weight:500;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideIn .25s ease;display:none;max-width:360px}

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:9998}
  .modal-overlay.active{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;max-width:420px;width:90%;animation:fadeScale .2s ease}
  .modal p{font-size:15px;line-height:1.6;margin-bottom:20px}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end}

  .lightbox-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:9997;cursor:zoom-out}
  .lightbox-overlay.active{display:flex}
  .lightbox-overlay img{max-width:92vw;max-height:90vh;border-radius:6px;box-shadow:0 0 60px rgba(0,0,0,.6);object-fit:contain}

  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:44px;max-width:420px;width:100%;text-align:center;animation:fadeScale .4s ease}
  .login-logo{width:64px;height:64px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));display:inline-flex;align-items:center;justify-content:center;color:var(--bg);margin-bottom:20px;box-shadow:0 4px 24px rgba(122,158,126,.25)}
  .login-title{font-size:24px;font-weight:700;color:var(--text-bright);margin-bottom:6px}
  .login-sub{font-size:14px;color:var(--text-dim);margin-bottom:28px;line-height:1.6}
  .login-input{width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;font-family:inherit;outline:none;margin-bottom:14px;transition:border-color .15s}
  .login-input:focus{border-color:var(--accent-border)}
  .login-input::placeholder{color:var(--text-faint)}
  .login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:var(--bg);border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
  .login-btn:hover{filter:brightness(1.1)}
  .login-btn:active{transform:scale(.98)}
  .login-btn:disabled{opacity:.5;cursor:not-allowed}
  .login-status{margin-top:16px;font-size:13px;color:var(--text-dim);min-height:20px;line-height:1.5}
  .login-status.error{color:var(--danger)}
  .login-status.success{color:var(--cond-excellent)}
  .login-toggle{background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;font-family:inherit;margin-top:14px;text-decoration:underline}
  .login-divider{font-size:12px;color:var(--text-faint);margin:4px 0 16px}
